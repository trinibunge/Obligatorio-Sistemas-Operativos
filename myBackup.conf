# =============================================================================
# .myBackup.conf — Archivo de configuración de myBackup
# =============================================================================
# Este archivo es cargado automáticamente si está en $HOME/.myBackup.conf
# También podés especificar otro archivo con: ./myBackup.sh -c /ruta/al/archivo
#
# Los valores aquí pueden ser sobreescritos por argumentos de línea de comandos.
# =============================================================================

# Directorio origen del backup (obligatorio si no se pasa -d)
ORIGEN=""

# Directorio destino donde se guardan los backups
DESTINO="$HOME/backups"

# Días que se conservan los backups antes de eliminarlos automáticamente
# 0 = no eliminar nunca
RETENCION=7

# Comprimir el backup con gzip (true/false)
COMPRIMIR=true

# Encriptar el backup con GPG (true/false)
ENCRIPTAR=false

# Destinatario GPG (email o ID de clave). Solo se usa si ENCRIPTAR=true
GPG_RECIPIENT=""

# Expresión cron para la ejecución automática
# Formato: minuto hora dia_mes mes dia_semana
# Ejemplos:
#   "0 2 * * *"     → todos los días a las 2:00am
#   "0 */6 * * *"   → cada 6 horas
#   "0 2 * * 1"     → todos los lunes a las 2:00am
FRECUENCIA="0 2 * * *"

# Archivo de log
LOG_FILE="$HOME/.mybackup.log"
